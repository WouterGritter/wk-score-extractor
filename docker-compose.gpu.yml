# GPU override for the prod host. Layer it on top of the base compose:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
# Requires the NVIDIA driver + nvidia-container-toolkit on the host. This host
# must also be able to reach the HDHomeRun at ${HDHR_IP} on the LAN.
services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: wk-score-extractor:gpu
    # USE_CUDA=1 is baked into Dockerfile.gpu; set here too for clarity/override.
    # NVIDIA_DRIVER_CAPABILITIES=all exposes libnvcuvid so optional NVDEC decode
    # (--hwaccel / FFMPEG_HWACCEL=1) can find it — compute+utility alone won't.
    environment:
      USE_CUDA: "1"
      NVIDIA_DRIVER_CAPABILITIES: all
    # Reserve all GPUs (equivalent to `docker run --gpus all`).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
